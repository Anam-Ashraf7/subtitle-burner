<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Video Studio</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<header>
  <h1>🎬 Video Studio</h1>
  <p class="sub">Pick a base video, layer on intro/outro and subtitles, then burn &amp; export.</p>
</header>

<!-- HERO: selected video preview + render controls -->
<section id="hero" class="hero" hidden>
  <div class="hero-left">
    <div class="stage">
      <video id="video" playsinline controls></video>
      <div id="subOverlay" class="sub-overlay"></div>
      <div id="blackOverlay" class="black-overlay" hidden><div id="blackText"></div></div>
    </div>
    <div class="preview-controls">
      <button id="playFull" class="ghost">▶ Preview full (intro→video→outro)</button>
      <button id="stopPreview" class="ghost" hidden>■ Stop</button>
      <button id="editToggle" class="ghost">✎ Edit intro/outro &amp; subtitles</button>
    </div>
  </div>

  <div class="hero-right">
    <div class="chosen">
      <div class="chosen-label">Now editing</div>
      <div id="chosenVideo" class="chosen-video">—</div>
      <div id="levelBadge" class="level-badge">Level 1 · Subtitles</div>
      <div id="chosenTemplate" class="chosen-template"></div>
    </div>

    <div class="render-box">
      <div class="render-row">
        <label class="sel">Level
          <select id="levelSel">
            <option value="0">0 · Intro/Outro only</option>
            <option value="1" selected>1 · Subtitles</option>
            <option value="2" disabled>2 · Audio (soon)</option>
            <option value="3" disabled>3 · Lip-sync (soon)</option>
          </select>
        </label>
        <label class="sel">Quality
          <select id="qualitySel">
            <option value="fast">Fastest</option>
            <option value="balanced" selected>Balanced</option>
            <option value="high">High</option>
          </select>
        </label>
        <label class="sel">Resolution
          <select id="resSel">
            <option value="480">480p</option>
            <option value="720">720p</option>
            <option value="1080" selected>1080p</option>
            <option value="2160">4K</option>
          </select>
        </label>
      </div>
      <button id="exportBtn">⬇ Burn &amp; Export MP4</button>
      <div id="exportMsg" class="msg"></div>
      <div id="progressWrap" class="progress-wrap" hidden>
        <div class="progress-track"><div id="progressBar" class="progress-bar"></div></div>
        <div class="progress-label"><span id="progressStage">Starting…</span><span id="progressPct">0%</span></div>
      </div>
    </div>
  </div>
</section>

<!-- EDIT DRAWER -->
<section id="drawer" class="drawer" hidden>
  <div class="drawer-head">
    <strong>Editor</strong>
    <button id="drawerClose" class="ghost">✕ Close</button>
  </div>
  <div class="tabs">
    <button class="tab active" data-tab="intro">Intro</button>
    <button class="tab" data-tab="subs">Subtitles</button>
    <button class="tab" data-tab="outro">Outro</button>
  </div>
  <div class="tabpane" id="pane-intro"></div>
  <div class="tabpane" id="pane-subs" hidden></div>
  <div class="tabpane" id="pane-outro" hidden></div>
</section>

<!-- NETFLIX ROWS -->
<main id="rows">
  <div class="row">
    <h2 class="row-title">Base Video</h2>
    <div class="rail" id="railVideos"><div class="loading">Loading videos…</div></div>
  </div>

  <div class="row">
    <h2 class="row-title"><span class="lv">Level 0</span> Intro &amp; Outro</h2>
    <div class="rail" id="railLevel0"></div>
  </div>

  <div class="row">
    <h2 class="row-title"><span class="lv">Level 1</span> Subtitles</h2>
    <div class="rail" id="railLevel1"><div class="loading">Loading templates…</div></div>
  </div>

  <div class="row">
    <h2 class="row-title"><span class="lv">Level 2</span> Audio + Subtitles</h2>
    <div class="rail" id="railLevel2"></div>
  </div>

  <div class="row">
    <h2 class="row-title"><span class="lv">Level 3</span> Lip-sync &amp; Face Swap</h2>
    <div class="rail" id="railLevel3"></div>
  </div>
</main>

<input type="file" id="xlsxInput" accept=".xlsx" hidden />
<script src="app.js"></script>
</body>
</html>
